<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">

<style>
#map{height:300px;width:100%;margin-top:10px;}
.card{border:1px solid #ccc;padding:10px;margin:10px;}
button{padding:5px 10px;margin:5px;}
</style>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LIVE GPS SEND
navigator.geolocation.watchPosition(async (pos) => {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  try {
    await updateDoc(doc(db, "mechanics", "mechanic1"), {
      lat,
      lng
    });
  } catch(e){
    console.log("Firebase error:", e);
  }
});

// 🔥 LIVE LISTENER
onSnapshot(doc(db, "mechanics", "mechanic1"), (snap) => {
  const data = snap.data();
  if(!data) return;

  document.getElementById("location").innerHTML =
  "📍 LIVE:<br>Lat: " + data.lat + "<br>Lng: " + data.lng;

  if(window.showMap){
    window.showMap(data.lat, data.lng);
  }
});

</script>

</head>

<body>

<h2>🔧 Mechanic Finder Pro</h2>

<p id="location">Location not detected</p>

<div id="map"></div>

<input type="text" id="searchBox" placeholder="Search mechanic">

<select id="vehicle">
<option>Bike</option>
<option>Car</option>
</select>

<select id="problem">
<option>Puncture</option>
<option>Battery</option>
</select>

<button onclick="findMechanic()">Search</button>

<div id="result"></div>

<hr>

<input type="text" id="garageName" placeholder="Garage Name">
<input type="text" id="phone" placeholder="Phone">

<button onclick="addGarage()">Add Garage</button>

<div id="garageList"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map;
let marker;
let routeLine;
let routePoints = [];

// 🗺️ MAP
function showMap(lat,lng){

if(!map){
map = L.map('map').setView([lat,lng],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);
}

if(marker){
marker.remove();
}

marker = L.marker([lat,lng]).addTo(map)
.bindPopup("Live Location").openPopup();

map.setView([lat,lng],15);
}

window.showMap = showMap;

// 🔥 SEARCH DATA
const mechanics = [
{
name:"Ravi Auto Service",
rating:"4.8",
distance:"1.2 KM",
phone:"9554230944",
cost:"₹300-₹500",
image:"https://images.unsplash.com/photo-1487754180451-c456f719a1fc?w=600"
}
];

// 🔍 SEARCH
function findMechanic(){

let search = document.getElementById("searchBox").value.toLowerCase();
let vehicle = document.getElementById("vehicle").value;
let problem = document.getElementById("problem").value;

let html = "";

mechanics.forEach(m => {

if(search === "" || m.name.toLowerCase().includes(search)){

html += `
<div class="card">
<img src="${m.image}" width="100%">
<h3>${m.name}</h3>
<p>⭐ ${m.rating}</p>
<p>🚗 ${vehicle}</p>
<p>⚠️ ${problem}</p>
<p>📍 ${m.distance}</p>
<p>💰 ${m.cost}</p>

<a href="tel:${m.phone}">
<button>📞 Call</button>
</a>

<a href="https://wa.me/91${m.phone}" target="_blank">
<button>💬 WhatsApp</button>
</a>

</div>
`;
}

});

document.getElementById("result").innerHTML = html;
}

window.findMechanic = findMechanic;

// ➕ ADD GARAGE
function addGarage(){
let name = document.getElementById("garageName").value;
let phone = document.getElementById("phone").value;

document.getElementById("garageList").innerHTML += `
<div class="card">
<h3>${name}</h3>
<p>${phone}</p>
</div>`;
}

window.addGarage = addGarage;

</script>

</body>
</html>
