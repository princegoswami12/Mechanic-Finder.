<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanic Finder Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>🔧 Mechanic Finder Pro</h1>
    <p>Find Nearby Mechanics Anytime, Anywhere</p>

    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<p id="time"></p>

<button class="emergency-btn" onclick="callEmergency()">
🚨 Emergency Help
</button>

<div id="map"></div>

<button onclick="getLocation()">📍 Use My Location</button>

<p id="location">Location not detected</p>

<input type="text" id="searchBox"
placeholder="🔍 Search Mechanic Name">

<h3>Select Vehicle</h3>

<select id="vehicle">
<option>Bike</option>
<option>Car</option>
<option>Truck</option>
<option>Bus</option>
<option>EV Vehicle</option>
</select>

<h3>Select Problem</h3>

<select id="problem">
<option>Puncture</option>
<option>Battery Problem</option>
<option>Engine Problem</option>
<option>Fuel Finished</option>
</select>

<button onclick="findMechanic()">
🔍 Find Mechanic
</button>

<div id="loading">
🔍 Searching Nearby Mechanics...
</div>

<div id="result"></div>

<hr>

<h2>💰 Cost Calculator</h2>

<input type="number"
id="km"
placeholder="Distance in KM">

<button onclick="calcCost()">
Calculate Cost
</button>

<p id="cost"></p>

<hr>

<h2>🏪 Add Your Garage</h2>

<input type="text"
id="garageName"
placeholder="Garage Name">

<input type="text"
id="phone"
placeholder="Phone Number">

<button onclick="addGarage()">
➕ Add Garage
</button>

<div id="garageList"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

let map;
let marker;

const mechanics = [
{
name:"Ravi Auto Service",
rating:"4.8",
distance:"1.2 KM",
phone:"9554230944",
cost:"₹300 - ₹500"
},
{
name:"Sharma Garage",
rating:"4.6",
distance:"2.5 KM",
phone:"9554230945",
cost:"₹400 - ₹700"
}
];

setInterval(()=>{
document.getElementById("time").innerHTML=
"🕒 "+new Date().toLocaleString();
},1000);

function toggleDarkMode(){
document.body.classList.toggle("dark");
}

function callEmergency(){
window.location.href="tel:112";
}

function showMap(lat,lng){

if(!map){

map=L.map('map').setView([lat,lng],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

L.Control.geocoder().addTo(map);
}

if(marker){
marker.remove();
}

marker=L.marker([lat,lng])
.addTo(map)
.bindPopup("📍 You are here")
.openPopup();

map.setView([lat,lng],15);
}

function getLocation(){

navigator.geolocation.getCurrentPosition(

function(position){

const lat=position.coords.latitude;
const lng=position.coords.longitude;

document.getElementById("location").innerHTML=
"Latitude: "+lat+"<br>Longitude: "+lng;

showMap(lat,lng);
},

function(){
alert("Location permission denied");
}

);
}

function findMechanic(){

let vehicle=document.getElementById("vehicle").value;
let problem=document.getElementById("problem").value;
let search=document.getElementById("searchBox").value.toLowerCase();

document.getElementById("loading").style.display="block";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

let html="<h2>🔧 Nearby Mechanics</h2>";

mechanics.forEach(m=>{

if(
search==="" ||
m.name.toLowerCase().includes(search)
){

let hour=new Date().getHours();

let status=
(hour>=8 && hour<=20)
? "🟢 Open"
: "🔴 Closed";

html+=`
<div class="card">

<h3>${m.name}</h3>

<p>⭐ Rating: ${m.rating}/5</p>
<p>${status}</p>
<p>🚗 Vehicle: ${vehicle}</p>
<p>⚠️ Problem: ${problem}</p>
<p>📍 Distance: ${m.distance}</p>
<p>💰 Estimated Cost: ${m.cost}</p>

<a href="tel:${m.phone}">
<button>📞 Call</button>
</a>

<a href="https://wa.me/${m.phone}"
target="_blank">
<button>💬 WhatsApp</button>
</a>

</div>
`;
}

});

document.getElementById("result").innerHTML=html;

},2000);
}

function calcCost(){

let km=document.getElementById("km").value;

let cost=200+(km*10);

document.getElementById("cost").innerHTML=
"Estimated Cost: ₹"+cost;
}

function addGarage(){

let name=
document.getElementById("garageName").value;

let phone=
document.getElementById("phone").value;

document.getElementById("garageList").innerHTML+=`

<div class="card">

<h3>${name}</h3>

<p>📞 ${phone}</p>

</div>

`;
}

</script>

</body>
</html>
